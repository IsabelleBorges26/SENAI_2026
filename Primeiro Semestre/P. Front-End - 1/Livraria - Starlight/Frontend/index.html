<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Livros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Livros</h1>

    <button id="btnAbrirModal">Adicionar Livro</button>

    <div id="listaProdutos"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="btnFecharModal" class="close">&times;</span>
            <h2>Cadastrar Livro</h2>
            <form id="formProduto" enctype="multipart/form-data">
                <input type="text" name="nome" placeholder="Nome" required><br>
                <input type="number" step="0.01" name="preco" placeholder="Preço" required><br>
                <input type="text" name="categoria" placeholder="Categoria" required><br>
                <input type="text" name="marca" placeholder="Marca" required><br>
                <input type="file" name="imagem" accept="image/*" required><br>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>

    <div id="detalhesProduto" class="detalhes"></div>

    <script src="script.js"></script>
</body>

</html>
