<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Movies 💫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f5f3ff;">

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded shadow-sm" style="background-color: #e0e7ff;">
        <h1 style="color: #6b5cff;">Disney Movies 💫</h1>

        <div class="d-flex gap-2">
            <button class="btn" style="background-color: #c7d2fe; color:#1e1b4b;">
                + Novo Filme
            </button>

            <input type="text" class="form-control" placeholder="Gênero">

            <button class="btn" style="background-color: #ddd6fe;">
                Filtrar
            </button>

            <button class="btn" style="background-color: #fbcfe8;">
                Limpar
            </button>
        </div>
    </div>

    <!-- TABELA -->
    <div class="table-responsive">
        <table class="table text-center align-middle shadow rounded" style="background-color: #ffffff;">
            <thead style="background-color: #ddd6fe;">
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td><img src="assets/frozem.png" width="80" class="rounded"></td>
                    <td>Frozen</td>
                    <td>Animação</td>
                    <td>2013</td>
                    <td>Livre</td>
                    <td>Disney</td>
                </tr>

                <tr>
                    <td><img src="assets/moana.jpg" width="80" class="rounded"></td>
                    <td>Moana</td>
                    <td>Aventura</td>
                    <td>2016</td>
                    <td>Livre</td>
                    <td>Disney</td>
                </tr>

                <tr>
                    <td><img src="assets/The_Lion_King.jpg" width="80" class="rounded"></td>
                    <td>Rei Leão</td>
                    <td>Drama</td>
                    <td>1994</td>
                    <td>Livre</td>
                    <td>Disney</td>
                </tr>

                <tr>
                    <td><img src="assets/aladin.jpg" width="80" class="rounded"></td>
                    <td>Aladdin</td>
                    <td>Fantasia</td>
                    <td>1992</td>
                    <td>Livre</td>
                    <td>Disney</td>
                </tr>

            </tbody>
        </table>
    </div>

</div>

</body>
</html>
