<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Disney Movies</title>

    <style>

    body {
        margin:0;
        overflow:hidden;
        font-family:Arial;
    }

    .video-container {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
    }

    .video-container iframe {
        width:100%;
        height:100%;
    }

    .botao {
        position:absolute;
        bottom:50px;
        left:50%;
        transform:translateX(-50%);
    }

    button {
        padding:15px 40px;
        font-size:20px;
        border:none;
        border-radius:30px;
        background:#01116c;
        color:white;
        cursor:pointer;
    }

button:hover{
    background:#616ef7;
}

</style>
</head>

<body>

<div class="video-container">
<iframe
src="https://www.youtube.com/embed/Tboq6TFVDfQ?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<div class="botao">
<button onclick="entrar()">Sejam Bem vindos á Disney Movie! Clique para cadastrar o seu filme...</button>
</div>

<script>
function entrar(){
    window.location.href = "cadastro.html";
}
</script>

</body>
</html>
